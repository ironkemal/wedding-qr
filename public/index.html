<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Düğün Fotoğrafları</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fdf8f2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 0.75rem;
      font-size: 1rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    input[type="text"]:focus { border-color: #c9a96e; }

    .file-area {
      border: 2px dashed #e0d8cc;
      border-radius: 0.75rem;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.25rem;
      position: relative;
    }

    .file-area:hover, .file-area.active { border-color: #c9a96e; background: #fdf3e3; }

    .file-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .file-hint {
      font-size: 0.85rem;
      color: #999;
    }

    .file-count {
      font-size: 0.9rem;
      font-weight: 600;
      color: #c9a96e;
      margin-top: 0.4rem;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #c9a96e;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) { background: #b8924f; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-wrap {
      margin-top: 1.25rem;
      display: none;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.4rem;
    }

    .progress-bar-bg {
      background: #f0e8dc;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #c9a96e;
      border-radius: 999px;
      width: 0%;
      transition: width 0.15s;
    }

    .status {
      margin-top: 1.25rem;
      padding: 0.9rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error   { background: #fdecea; color: #c62828; }
  </style>
</head>
<body>
<div class="card">
  <h1>📸 Fotoğraf Yükle</h1>
  <p class="subtitle">Çektiğiniz fotoğraf ve videoları bizimle paylaşın</p>

  <label for="guestName">Adınız</label>
  <input type="text" id="guestName" placeholder="Ahmet Yılmaz" autocomplete="name" />

  <label>Fotoğraf / Video</label>
  <div class="file-area" id="fileArea">
    <input type="file" id="fileInput" accept="image/*,video/*" multiple capture="environment" />
    <div class="file-icon">🖼️</div>
    <div class="file-hint">Buraya dokunarak fotoğraf veya video seç<br><small>Birden fazla seçebilirsiniz</small></div>
    <div class="file-count" id="fileCount"></div>
  </div>

  <button id="uploadBtn" disabled>Yükle</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressFile">Yükleniyor…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="status" id="statusMsg"></div>
</div>

<script>
  const nameInput   = document.getElementById("guestName");
  const fileInput   = document.getElementById("fileInput");
  const fileArea    = document.getElementById("fileArea");
  const fileCount   = document.getElementById("fileCount");
  const uploadBtn   = document.getElementById("uploadBtn");
  const progressWrap = document.getElementById("progressWrap");
  const progressFile = document.getElementById("progressFile");
  const progressPct  = document.getElementById("progressPct");
  const progressBar  = document.getElementById("progressBar");
  const statusMsg   = document.getElementById("statusMsg");

  function updateBtn() {
    uploadBtn.disabled = fileInput.files.length === 0;
  }

  fileInput.addEventListener("change", () => {
    const n = fileInput.files.length;
    fileCount.textContent = n ? `${n} dosya seçildi` : "";
    updateBtn();
  });

  function showStatus(type, text) {
    statusMsg.className = "status " + type;
    statusMsg.textContent = text;
    statusMsg.style.display = "block";
  }

  function setProgress(fileName, pct) {
    progressFile.textContent = fileName;
    progressPct.textContent  = Math.round(pct) + "%";
    progressBar.style.width  = pct + "%";
  }

  async function uploadFile(file, guestName) {
    // 1) Ask the server to open a Drive resumable session
    const initRes = await fetch("/api/init-upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        guestName:    guestName,
        originalName: file.name,
        mimeType:     file.type || "application/octet-stream",
      }),
    });

    if (!initRes.ok) {
      const { error } = await initRes.json().catch(() => ({}));
      throw new Error(error || "Sunucu hatası");
    }

    const { sessionUrl } = await initRes.json();

    // 2) PUT file bytes directly to Drive — NO Authorization, NO custom headers.
    //    The session URL carries the auth. Keeping headers minimal avoids CORS preflight.
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("PUT", sessionUrl);
      xhr.setRequestHeader("Content-Type", file.type || "application/octet-stream");

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) setProgress(file.name, (e.loaded / e.total) * 100);
      };

      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve();
        else reject(new Error(`Drive yükleme hatası: ${xhr.status}`));
      };

      xhr.onerror = () => reject(new Error("Ağ hatası — internet bağlantınızı kontrol edin"));
      xhr.send(file);
    });
  }

  uploadBtn.addEventListener("click", async () => {
    const files     = Array.from(fileInput.files);
    const guestName = nameInput.value.trim();

    if (!files.length) return;

    uploadBtn.disabled = true;
    statusMsg.style.display  = "none";
    progressWrap.style.display = "block";

    let failed = 0;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      setProgress(`${file.name} (${i + 1}/${files.length})`, 0);
      try {
        await uploadFile(file, guestName);
        setProgress(`${file.name} (${i + 1}/${files.length})`, 100);
      } catch (err) {
        console.error(err);
        failed++;
      }
    }

    progressWrap.style.display = "none";

    if (failed === 0) {
      showStatus("success", `✓ ${files.length} dosya yüklendi! Teşekkürler 🎉`);
      fileInput.value = "";
      fileCount.textContent = "";
    } else if (failed < files.length) {
      showStatus("error", `${files.length - failed} dosya yüklendi, ${failed} dosya başarısız oldu.`);
    } else {
      showStatus("error", "Yükleme başarısız. Lütfen tekrar deneyin.");
    }

    uploadBtn.disabled = false;
  });
</script>
</body>
</html>
